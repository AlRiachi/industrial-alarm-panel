name: Feature request
description: Suggest an improvement for Industrial Alarm Panel.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, service, entity, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or different approach you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or related Home Assistant entities if helpful.
